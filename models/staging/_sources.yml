version: 2

sources:
  - name: raw
    description: "Raw CSV data loaded from Kaggle AI Economy dataset"
    database: ai_economy
    schema: raw
    tables:
      - name: company_adoption
        description: "Company-level AI adoption survey"
        columns:
          - name: response_id
            data_tests:
              - not_null
              - unique
          - name: company_id
            data_tests:
              - not_null
          - name: country
            data_tests:
              - not_null
          - name: ai_adoption_stage
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['none', 'pilot', 'partial', 'full']

      - name: workforce_displacement
        description: "Workforce displacement metrics by country, sector and quarter"
        columns:
          - name: record_id
            data_tests:
              - not_null
              - unique
          - name: country
            data_tests:
              - not_null
          - name: year
            data_tests:
              - not_null

      - name: worker_burnout
        description: "Worker-level survey on AI exposure, burnout, attrition risk"
        columns:
          - name: employee_id
            data_tests:
              - not_null
              - unique
          - name: attrition_risk
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['Low', 'Medium', 'High']

      - name: economy_pulse
        description: "Daily time series: AI stocks, macro indicators, AI interest signals"
        columns:
          - name: date
            data_tests:
              - not_null
              - unique

      - name: workforce_automation
        description: "Annual macro aggregates by country"
        columns:
          - name: year
            data_tests:
              - not_null
          - name: country
            data_tests:
              - not_null
